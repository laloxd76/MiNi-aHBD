<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Feliz Cumpleaños Montserrath!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(45deg, #ff007f, #800080, #ff4d4d);
            background-size: 400% 400%;
            animation: gradient 10s ease infinite;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow: hidden;
            text-align: center;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            z-index: 10;
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        h1 { font-size: 3em; text-shadow: 2px 2px 10px rgba(0,0,0,0.3); margin-bottom: 10px; }
        p { font-size: 1.5em; font-style: italic; }

        .photos {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 20px 0;
        }

        .photo-frame {
            width: 150px;
            height: 150px;
            border: 5px solid white;
            border-radius: 10px;
            object-fit: cover;
            transform: rotate(-5deg);
            transition: 0.3s;
        }

        .photo-frame:nth-child(2) { transform: rotate(5deg); }
        .photo-frame:hover { transform: scale(1.1) rotate(0deg); }

        button {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2em;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        button:hover { background: #ff007f; transform: scale(1.1); }
    </style>
</head>
<body>

    <div class="container">
        <h1>¡Feliz Cumpleaños Montserrath! 🎂</h1>
        
        <div class="photos">
            <img src="foto1.jpg" alt="Montse 1" class="photo-frame">
            <img src="foto2.jpg" alt="Montse 2" class="photo-frame">
        </div>

        <p id="mensaje-sorpresa" style="display: none;"></p>
        <button onclick="lanzarSorpresa()">¡Haz clic aquí!</button>
    </div>

    <script>
        function lanzarSorpresa() {
            // Lluvia de confeti
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#ff007f', '#800080', '#ff4d4d']
            });

            // Mostrar el mensaje
            const msg = document.getElementById('mensaje-sorpresa');
            msg.innerText = "Te amo mucho chiflada ❤️";
            msg.style.display = "block";
        }
    </script>
</body>
</html>
