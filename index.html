<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Montserrath ❤️</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            /* USAMOS TU IMAGEN DE SNOOPY LOCAL */
background-image: url('foto3.png');
background-size: cover; /* Cubre toda la pantalla */
    background-position: center center;
            background-attachment: fixed;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Capa para opacar el fondo y leer el texto */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.5); /* Semi-transparente */
            z-index: 1;
        }

        header, .envelope-wrapper, #seccion-fotos {
            position: relative;
            z-index: 10;
        }

        h1 {
            color: #ff4d4d;
            background: rgba(255, 255, 255, 0.8);
            padding: 10px 20px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-top: 20px;
            font-size: 2.2em;
        }

        /* EL SOBRE - CORREGIDO, CARTA ADENTRO */
        .envelope-wrapper {
            margin: 100px 0 50px 0;
        }

        .envelope {
            position: relative;
            width: 300px;
            height: 200px;
            background: #f08080;
            border-radius: 0 0 10px 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden; /* ESTO ESCONDE LA CARTA ADENTRO */
        }

        /* Tapa del sobre */
        .flap {
            position: absolute;
            top: -100px; /* Ajuste para que tape bien */
            left: 0;
            width: 0;
            height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-bottom: 100px solid #ff9999;
            z-index: 5;
            transition: transform 0.6s, z-index 0.6s;
            transform-origin: bottom;
        }

        /* La carta ADENTRO (invisible al inicio) */
        .letter {
            position: absolute;
            bottom: -150px; /* Escondida abajo */
            left: 20px;
            width: 260px;
            height: 160px;
            background: white;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
            border-radius: 5px;
            transition: transform 0.8s;
            z-index: 2;
        }

        /* Animación de apertura al dar click */
        .envelope-wrapper.open .flap {
            transform: rotateX(180deg);
            z-index: 1; /* Pasa atrás al abrir */
        }

        .envelope-wrapper.open .letter {
            transform: translateY(-200px); /* Sube la carta */
        }

        .envelope-wrapper.open .envelope {
            overflow: visible; /* Deja que la carta salga */
        }

        /* SECCIÓN FOTOS */
        #seccion-fotos {
            display: none;
            text-align: center;
            background: white;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 50px;
            width: 90%;
            max-width: 450px;
            animation: fadeIn 1s;
        }

.photos {
    display: flex;
    justify-content: center;
    flex-wrap: wrap; /* Permite que la foto 2 baje si no hay espacio */
    gap: 15px;
    padding: 10px;
}

.photo-frame {
    width: 85%; /* En celular ocupará casi todo el ancho */
    max-width: 250px; /* Pero no crecerá demasiado */
    height: auto;
    object-fit: cover;
    border: 8px solid #ffb6c1;
    border-radius: 10px;
}

        .photo-frame:nth-child(2) { transform: rotate(3deg); }

        .btn-abrir {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: bold;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <header>
        <h1>¡Feliz Cumple Montserrath! ❤️</h1>
        <button class="btn-abrir" onclick="abrirCarta()">Toca para abrir tu sorpresa 🐾</button>
    </header>

    <div class="envelope-wrapper">
        <div class="flap"></div>
        <div class="envelope">
            <div class="letter">
                <p><strong>De: Tu niño lalo</strong></p>
                <p style="margin-top: 10px;">Eres la persona más especial del mundo. Gracias por ser mi felicidad.</p>
                <p style="color: red; font-weight: bold; margin-top: 10px;">¡Te amo mucho chiflada! ❤️</p>
            </div>
        </div>
    </div>

    <div id="seccion-fotos">
        <h2 style="color: #ff4d4d;">Te amo corazón de melón</h2>
        <div class="photos">
            <img src="foto1.jpeg" class="photo-frame">
            <img src="foto2.jpeg" class="photo-frame">
        </div>
        <p style="margin-top: 30px;">Que cumplas muchísimos más, <strong>mi niña hermosa</strong>. 🎂</p>
    </div>

    <script>
        function abrirCarta() {
            const wrapper = document.querySelector('.envelope-wrapper');
            const fotos = document.getElementById('seccion-fotos');
            
            // Si ya está abierta, no hace nada
            if (wrapper.classList.contains('open')) return;

            wrapper.classList.add('open');
            
            // Lluvia de confetti (blanco, rojo, rosa)
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#ffffff', '#ff0000', '#ffb6c1']
            });

            // Esperar un poco para mostrar las fotos
            setTimeout(() => {
                fotos.style.display = 'block';
                // Scroll suave hacia abajo para ver las fotos
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }, 1000);
        }
    </script>
</body>
</html>
