<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Montserrath ❤️</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --color-principal: #ffb6c1; /* Rosa pastel Snoopy */
            --color-acento: #ff4d4d;
            --color-morado: #9370db;
        }

        body {
            margin: 0;
            background: #fff0f5; /* Fondo rosado muy claro */
            font-family: 'Comic Sans MS', cursive, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* FONDO DE SNOOPY (Imágenes flotantes sutiles) */
        .snoopy-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            opacity: 0.2;
            background-image: url('https://www.pngarts.com/files/11/Snoopy-Download-Transparent-PNG-Image.png');
            background-size: 200px;
            background-repeat: space;
        }

        header {
            margin-top: 30px;
            text-align: center;
            animation: bounce 2s infinite;
        }

        h1 {
            color: var(--color-acento);
            font-size: 2.5em;
            text-shadow: 2px 2px white;
        }

        /* EL SOBRE DE LA CARTA */
        .envelope-wrapper {
            position: relative;
            cursor: pointer;
            margin: 50px 0;
        }

        .envelope {
            position: relative;
            width: 250px;
            height: 150px;
            background: #f08080;
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .envelope::before {
            content: '';
            position: absolute;
            top: 0;
            width: 0;
            height: 0;
            border-left: 125px solid transparent;
            border-right: 125px solid transparent;
            border-top: 90px solid #ff9999;
            transform-origin: top;
            transition: transform 0.6s;
            z-index: 2;
        }

        .letter {
            position: absolute;
            bottom: 0;
            left: 10px;
            width: 230px;
            height: 130px;
            background: white;
            padding: 15px;
            box-sizing: border-box;
            text-align: center;
            transition: transform 0.6s;
            z-index: 1;
            border-radius: 5px;
        }

        .letter p {
            font-size: 0.9em;
            color: #333;
            margin: 0;
        }

        /* Abrir carta */
        .envelope-wrapper.open .envelope::before {
            transform: rotateX(180deg);
        }
        .envelope-wrapper.open .letter {
            transform: translateY(-100px);
            height: auto;
            z-index: 3;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* CONTENEDOR DE FOTOS (Oculto al inicio) */
        #seccion-fotos {
            display: none;
            text-align: center;
            margin-bottom: 50px;
            animation: fadeIn 1.5s;
        }

        .photos {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .photo-frame {
            width: 200px;
            border: 10px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transform: rotate(-3deg);
            transition: 0.3s;
        }
        .photo-frame:nth-child(2) { transform: rotate(3deg); }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .click-me {
            color: var(--color-morado);
            font-weight: bold;
            font-size: 1.1em;
        }
    </style>
</head>
<body>

    <div class="snoopy-bg"></div>

    <header>
        <h1>¡Feliz Cumpleaños Montserrath! ❤️</h1>
        <p class="click-me">Toca el sobre para abrir tu regalo</p>
    </header>

    <div class="envelope-wrapper" onclick="abrirCarta()">
        <div class="envelope">
            <div class="letter">
                <p><strong>De: Lalo</strong></p>
                <p style="margin-top: 10px;">Eres la persona más especial del mundo. Gracias por estar conmigo.</p>
                <p style="color: red; font-weight: bold; margin-top: 10px;">¡Te amo mucho chiflada! ❤️</p>
            </div>
        </div>
    </div>

    <div id="seccion-fotos">
        <h2 style="color: var(--color-morado);">Nuestros Momentos</h2>
        <div class="photos">
            <img src="foto1.jpeg" class="photo-frame">
            <img src="foto2.jpeg" class="photo-frame">
        </div>
        <p style="margin-top: 30px; font-size: 1.2em;">Que cumplas muchísimos más, Montse. 🎂🐾</p>
    </div>

    <script>
        function abrirCarta() {
            const wrapper = document.querySelector('.envelope-wrapper');
            const fotos = document.getElementById('seccion-fotos');
            
            if (!wrapper.classList.contains('open')) {
                wrapper.classList.add('open');
                
                // Confetti de Snoopy (blanco, rojo, rosa)
                confetti({
                    particleCount: 150,
                    spread: 70,
                    origin: { y: 0.6 },
                    colors: ['#ffffff', '#ff0000', '#ffb6c1']
                });

                // Esperar un poco para mostrar las fotos
                setTimeout(() => {
                    fotos.style.display = 'block';
                    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                }, 1000);
            }
        }
    </script>
</body>
</html>
