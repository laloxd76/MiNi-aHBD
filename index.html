<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Montserrath ❤️</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0;
            /* COLLAGE DE SNOOPY - LINK DIRECTO */
            background-image: url('https://wallpapercave.com/wp/wp5032549.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.4); /* Filtro para ver el collage pero leer bien */
            z-index: 0;
        }

        header, .envelope-wrapper, #seccion-fotos {
            position: relative;
            z-index: 10;
        }

        h1 {
            color: #ff4d4d;
            background: white;
            padding: 10px 20px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-top: 20px;
        }

        /* EL SOBRE - CORREGIDO */
        .envelope-wrapper {
            margin: 100px 0 50px 0;
        }

        .envelope {
            position: relative;
            width: 300px;
            height: 200px;
            background: #f08080;
            border-radius: 0 0 10px 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden; /* ESTO ESCONDE LA CARTA ADENTRO */
        }

        /* Tapa del sobre */
        .flap {
            position: absolute;
            top: -100px; /* Ajuste para que tape bien */
            left: 0;
            width: 0;
            height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-bottom: 100px solid #ff9999;
            z-index: 5;
            transition: transform 0.6s, z-index 0.6s;
            transform-origin: bottom;
        }

        .letter {
            position: absolute;
            bottom: -150px; /* Escondida abajo */
            left: 20px;
            width: 260px;
            height: 160px;
            background: white;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
            border-radius: 5px;
            transition: transform 0.8s;
            z-index: 2;
        }

        /* Animación de apertura */
        .envelope-wrapper.open .flap {
            transform: rotateX(180deg);
            z-index: 1; /* Pasa atrás al abrir */
        }

        .envelope-wrapper.open .letter {
            transform: translateY(-200px); /* Sube la carta */
        }

        .envelope-wrapper.open .envelope {
            overflow: visible; /* Deja que la carta salga */
        }

        /* SECCIÓN FOTOS */
        #seccion-fotos {
            display: none;
            text-align: center;
            background: white;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 50px;
            width: 90%;
            max-width: 450px;
        }

        .photo-frame {
            width: 180px;
            height: 180px;
            object-fit: cover;
            border: 8px solid #ffb6c1;
            margin: 10px;
            transform: rotate(-3deg);
        }

        .btn-abrir {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <header>
        <h1>¡Feliz Cumple Montserrath!</h1>
        <button class="btn-abrir" onclick="abrirCarta()">Toca para abrir tu sorpresa</button>
    </header>

    <div class="envelope-wrapper">
        <div class="flap"></div>
        <div class="envelope">
            <div class="letter">
                <p><strong>De: Tu niño lalo</strong></p>
                <p>Eres la persona más especial del mundo.</p>
                <p style="color: red; font-weight: bold;">¡Te amo mucho chiflada! ❤️</p>
            </div>
        </div>
    </div>

    <div id="seccion-fotos">
        <h2 style="color: #ff4d4d;">Te amo corazón de melón</h2>
        <div class="photos">
            <img src="foto1.jpeg" class="photo-frame">
            <img src="foto2.jpeg" class="photo-frame">
        </div>
        <p>Que cumplas muchísimos más, <strong>mi niña hermosa</strong>. 🎂</p>
    </div>

    <script>
        function abrirCarta() {
            const wrapper = document.querySelector('.envelope-wrapper');
            const fotos = document.getElementById('seccion-fotos');
            
            wrapper.classList.add('open');
            
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#ffffff', '#ff0000', '#ffb6c1']
            });

            setTimeout(() => {
                fotos.style.display = 'block';
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }, 1000);
        }
    </script>
</body>
</html>
